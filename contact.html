<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
</head>

<body>
    <h1>Contact Me</h1>
    <form action="submit_form.php" method="post">
        <fieldset>
            <legend>Personal Information</legend>
        <label for="name">Full Name:</label><br>
        <input type="text" id="name" name="name" placeholder="Enter your full name" required><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email" placeholder="Enter your email address" required><br><br>

        <label for="phone"Phone Number:</label><br>
        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message here" required></textarea><br><br>
        </fieldset>

        <fieldset>
            <legend>Message Details</legend>
        <label for="subject">Subject:</label><br>
       <select id="subject" name="subject" required>
            <option value="">Select a subject</option>
            <option value="general">General Inquiry</option>
            <option value="support">Support Request</option>
            <option value="feedback">Feedback</option>


        </select><br><br>

        <label for="message">Message:</label><br>
        <textarea id="message" name="message" rows="4" cols="50" placeholder="Enter your message here" required></textarea><br><br>

        </fieldset>

        <label>
            <input type="checkbox" name="newsletter">
            Subscribe to our newsletter
        </label>

        <br><br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
